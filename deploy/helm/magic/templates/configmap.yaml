apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "magic.configMapName" . }}
  labels:
    {{- include "magic.labels" . | nindent 4 }}
data:
  {{- /* Prefix each key with MAGIC_ so the binary picks it up directly. */ -}}
  {{- range $k, $v := .Values.config }}
  {{- if ne (toString $v) "" }}
  MAGIC_{{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
