name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.1.0
        with:
          go-version: '1.25'
      - name: Build
        run: cd core && go build ./cmd/magic
      - name: Test with Race Detection
        run: cd core && go test ./... -v -race -count=1
      - name: Vet
        run: cd core && go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@971e284b6050e8a5849b72094c50ab08da042db8  # v6.1.1
        with:
          version: latest
          working-directory: core

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.1.0
        with:
          go-version: '1.25'
      - name: Run E2E tests
        run: cd core && go test -tags=e2e -race -timeout=300s ./internal/e2e/...

  go-sdk:
    name: Go SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.1.0
        with:
          go-version: '1.25'
      - name: Test
        run: cd sdk/go && go test ./... -v -race

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'
      - name: Install SDK
        run: cd sdk/python && pip install -e ".[dev]"
      - name: Lint
        run: cd sdk/python && pip install ruff && ruff check .
      - name: Test
        run: cd sdk/python && pytest tests/ -v

  typescript:
    name: TypeScript SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'
      - name: Build
        run: cd sdk/typescript && npm install && npm run build
      - name: Test
        run: cd sdk/typescript && node --test dist/test.js

  govulncheck:
    name: Go Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.1.0
        with:
          go-version: '1.25'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan core
        run: cd core && govulncheck ./...
      - name: Scan sdk/go
        run: cd sdk/go && govulncheck ./...

  gosec:
    name: Go Security (gosec SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run gosec
        # TODO pin SHA — upstream publishes @master only; track release tag when available
        uses: securego/gosec@master
        with:
          args: '-fmt sarif -out gosec-results.sarif ./core/...'
      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.1
        with:
          sarif_file: gosec-results.sarif
