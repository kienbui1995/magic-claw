name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        run: cd core && go build ./cmd/magic
      - name: Test with Race Detection
        run: cd core && go test ./... -v -race -count=1
      - name: Vet
        run: cd core && go vet ./...

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install SDK
        run: cd sdk/python && pip install -e ".[dev]"
      - name: Test
        run: cd sdk/python && pytest tests/ -v
