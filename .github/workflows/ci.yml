name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build
        run: cd core && go build ./cmd/magic
      - name: Test with Race Detection
        run: cd core && go test ./... -v -race -count=1
      - name: Vet
        run: cd core && go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: core

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run E2E tests
        run: cd core && go test -tags=e2e -race -timeout=300s ./internal/e2e/...

  go-sdk:
    name: Go SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Test
        run: cd sdk/go && go test ./... -v -race

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install SDK
        run: cd sdk/python && pip install -e ".[dev]"
      - name: Lint
        run: cd sdk/python && pip install ruff && ruff check .
      - name: Test
        run: cd sdk/python && pytest tests/ -v

  typescript:
    name: TypeScript SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        run: cd sdk/typescript && npm install && npm run build
      - name: Test
        run: cd sdk/typescript && node --test dist/test.js

  govulncheck:
    name: Go Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan core
        run: cd core && govulncheck ./...
      - name: Scan sdk/go
        run: cd sdk/go && govulncheck ./...

  gosec:
    name: Go Security (gosec SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: '-fmt sarif -out gosec-results.sarif ./core/...'
      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec-results.sarif
