name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: |
          cd core
          GOOS=linux  GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/magic-linux-amd64  ./cmd/magic
          GOOS=linux  GOARCH=arm64 go build -ldflags="-s -w" -o ../dist/magic-linux-arm64  ./cmd/magic
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/magic-darwin-amd64 ./cmd/magic
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o ../dist/magic-darwin-arm64 ./cmd/magic

      - name: Generate checksums
        run: |
          cd dist
          sha256sum magic-linux-amd64 magic-linux-arm64 magic-darwin-amd64 magic-darwin-arm64 > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  publish-pypi:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: cd sdk/python && python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  publish-npm:
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-latest
    needs: release
    permissions: {}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Build
        run: cd sdk/typescript && npm install && npm run build
      - name: Publish
        run: cd sdk/typescript && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
