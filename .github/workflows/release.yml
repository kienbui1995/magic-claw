name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          cd core
          GOOS=linux  GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/magic-linux-amd64  ./cmd/magic
          GOOS=linux  GOARCH=arm64 go build -ldflags="-s -w" -o ../dist/magic-linux-arm64  ./cmd/magic
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/magic-darwin-amd64 ./cmd/magic
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o ../dist/magic-darwin-arm64 ./cmd/magic

      - name: Generate checksums
        run: |
          cd dist
          sha256sum magic-linux-amd64 magic-linux-arm64 magic-darwin-amd64 magic-darwin-arm64 > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  publish-pypi:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: release
    permissions:
      id-token: write  # for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: cd sdk/python && python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
